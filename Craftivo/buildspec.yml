version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18 # Specify your language version
    commands:
      - echo Installing dependencies...
      - npm install
  pre_build:
    commands:
      - echo Running unit tests...
      - npm test
  build:
    commands:
      - echo Build started on `date`
      - npm run build
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*' # This tells AWS to save all files produced by the build
  base-directory: 'dist' # Change this to your output folder (e.g., 'build' or 'out')
